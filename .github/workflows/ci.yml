name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @shout/shared run build

      - name: Run ESLint
        run: pnpm --filter @shout/web run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build shared package
        run: pnpm --filter @shout/shared run build

      - name: Build vt-wasm
        run: pnpm --filter @shout/vt-wasm run build

      - name: Copy vt-wasm to worker
        run: node packages/worker/scripts/copy-vt-wasm.js

      - name: Typecheck CLI
        run: pnpm --filter @shout/cli run typecheck

      - name: Typecheck Worker
        run: pnpm --filter @shout/worker run typecheck

      - name: Typecheck SDK
        run: pnpm --filter @shout/sdk run typecheck

      - name: Typecheck MCP
        run: pnpm --filter @shout/mcp run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @shout/shared run build

      - name: Build vt-wasm
        run: pnpm --filter @shout/vt-wasm run build

      - name: Build CLI
        run: pnpm --filter @shout/cli run build

      - name: Build SDK
        run: pnpm --filter @shout/sdk run build

      - name: Build MCP
        run: pnpm --filter @shout/mcp run build

      - name: Build Worker
        run: pnpm --filter @shout/worker run build

      - name: Build Web
        run: pnpm --filter @shout/web run build
