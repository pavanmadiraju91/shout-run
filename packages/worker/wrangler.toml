name = "shout-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "SESSION_HUB", class_name = "SessionHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionHub"]

[[r2_buckets]]
binding = "SESSIONS_BUCKET"
bucket_name = "shout-sessions"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "f0b42db3fede40d396def6137f0b668a"

# Secrets (set via `wrangler secret put`):
# TURSO_URL, TURSO_AUTH_TOKEN, JWT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
